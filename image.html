<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SKY — Image Generator UI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 24px; }
h1 { font-size: 1.5rem; margin-bottom: 24px; color: #8bb4ff; }
h1 a { color: #555; text-decoration: none; font-size: 0.85rem; margin-left: 12px; }
h1 a:hover { color: #8bb4ff; }

/* Form */
.panel { background: #16213e; border: 1px solid #2a2a4a; border-radius: 8px; padding: 24px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 0.85rem; color: #8bb4ff; margin-bottom: 6px; }
.field input[type="text"], .field textarea { width: 100%; padding: 10px; background: #0d1b2a; border: 1px solid #2a2a4a; border-radius: 6px; color: #e0e0e0; font-size: 0.9rem; }
.field textarea { resize: vertical; min-height: 60px; }
.field input[type="range"] { width: 100%; accent-color: #8bb4ff; }

/* Drop zone */
.drop-zone { border: 2px dashed #2a2a4a; border-radius: 8px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; min-height: 120px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; }
.drop-zone:hover, .drop-zone.dragover { border-color: #8bb4ff; background: rgba(139,180,255,0.05); }
.drop-zone img { max-width: 100%; max-height: 200px; border-radius: 4px; }
.drop-zone input { display: none; }
.drop-zone .placeholder { color: #555; font-size: 0.85rem; }

/* Row */
.row { display: flex; gap: 16px; }
.row .field { flex: 1; }

/* API settings */
.api-settings { background: #0d1b2a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
.api-settings summary { cursor: pointer; color: #8bb4ff; font-size: 0.85rem; }
.api-settings .fields { margin-top: 12px; display: flex; gap: 12px; }
.api-settings input { flex: 1; padding: 8px; background: #16213e; border: 1px solid #2a2a4a; border-radius: 6px; color: #e0e0e0; font-size: 0.85rem; }

/* Button */
.submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #4a6fa5, #8bb4ff); border: none; border-radius: 8px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.submit-btn:hover { opacity: 0.9; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Log */
.log-area { margin-top: 24px; background: #0d1b2a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 16px; display: none; }
.log-area h3 { font-size: 0.85rem; color: #8bb4ff; margin-bottom: 8px; }
.log-area .log { font-family: 'SF Mono', Monaco, monospace; font-size: 0.8rem; color: #aaa; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
.log .error { color: #ff6b6b; }
.log .success { color: #6bff9e; }

/* Result */
.result-area { margin-top: 16px; display: none; }
.result-area img { width: 100%; border-radius: 8px; background: #000; }
.download-btn { display: inline-block; margin-top: 8px; padding: 8px 16px; background: #2a4a2a; border: 1px solid #3a6a3a; border-radius: 6px; color: #6bff9e; text-decoration: none; font-size: 0.85rem; }

/* Footer */
footer { margin-top: 48px; padding: 24px 0; border-top: 1px solid #2a2a4a; text-align: center; font-size: 0.8rem; color: #666; }
footer a { color: #8bb4ff; text-decoration: none; }
footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>SKY — Image Generator <a href="index.html">Video Generator</a></h1>

  <details class="api-settings" id="apiSettings">
    <summary>API Settings</summary>
    <div class="fields">
      <label for="endpointId" class="sr-only">Endpoint ID</label>
      <input type="text" id="endpointId" placeholder="Endpoint ID">
      <label for="apiKey" class="sr-only">API Key</label>
      <input type="password" id="apiKey" placeholder="API Key">
    </div>
  </details>

  <div class="panel">
    <div class="field">
      <label for="file-ref">参照画像</label>
      <div class="drop-zone" id="drop-ref">
        <input type="file" id="file-ref" accept="image/*">
        <span class="placeholder">クリックまたはドラッグ＆ドロップで参照画像を選択</span>
      </div>
    </div>
    <div class="field">
      <label for="prompt">プロンプト</label>
      <textarea id="prompt" placeholder="a beautiful portrait in watercolor style..."></textarea>
    </div>
    <div class="field">
      <label for="negative">ネガティブプロンプト</label>
      <textarea id="negative" placeholder="lowres, bad anatomy, blurry..."></textarea>
    </div>
    <div class="row">
      <div class="field">
        <label for="width">幅</label>
        <input type="text" id="width" value="1024">
      </div>
      <div class="field">
        <label for="height">高さ</label>
        <input type="text" id="height" value="1024">
      </div>
      <div class="field">
        <label for="steps">ステップ数</label>
        <input type="text" id="steps" value="20">
      </div>
      <div class="field">
        <label for="seed">シード</label>
        <input type="text" id="seed" value="42">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label for="guidance">ガイダンス: <span id="guidance-val">3.5</span></label>
        <input type="range" id="guidance" min="0" max="10" step="0.5" value="3.5">
      </div>
      <div class="field">
        <label for="ip-weight">IP-Adapter重み: <span id="ip-weight-val">0.8</span></label>
        <input type="range" id="ip-weight" min="0" max="2" step="0.1" value="0.8">
      </div>
      <div class="field">
        <label for="quality">JPEG品質: <span id="quality-val">90</span></label>
        <input type="range" id="quality" min="1" max="100" value="90">
      </div>
    </div>
    <button class="submit-btn" id="submitBtn">生成開始</button>
  </div>

  <div class="log-area" id="logArea">
    <h3>ログ</h3>
    <div class="log" id="log"></div>
  </div>

  <div class="result-area" id="resultArea">
    <img id="resultImage">
    <a class="download-btn" id="downloadBtn" download="output.jpg">ダウンロード</a>
  </div>

  <footer>
    <p>copyright &copy; 2026 bonsoleil</p>
    <p>
      <a href="https://github.com/bizendao/sky" target="_blank" rel="noopener noreferrer">GitHub</a>
      &nbsp;|&nbsp;
      <a href="https://github.com/bizendao/generate_image" target="_blank" rel="noopener noreferrer">generate_image</a>
    </p>
  </footer>
</div>

<script>
// --- State ---
let refImage = null;
let polling = null;

// --- API settings persistence (shared with video UI) ---
function loadSettings() {
  const s = localStorage.getItem('sky_api_image');
  if (s) {
    const d = JSON.parse(s);
    document.getElementById('endpointId').value = d.e || '';
    document.getElementById('apiKey').value = d.k || '';
  }
}
function saveSettings() {
  localStorage.setItem('sky_api_image', JSON.stringify({
    e: document.getElementById('endpointId').value,
    k: document.getElementById('apiKey').value
  }));
}
document.getElementById('endpointId').addEventListener('change', saveSettings);
document.getElementById('apiKey').addEventListener('change', saveSettings);
loadSettings();

// --- Range sliders ---
document.querySelectorAll('input[type="range"]').forEach(r => {
  r.addEventListener('input', () => {
    const valEl = document.getElementById(r.id + '-val');
    if (valEl) valEl.textContent = r.value;
  });
});

// --- Drop zone ---
const zone = document.getElementById('drop-ref');
const fileInput = document.getElementById('file-ref');

zone.addEventListener('click', () => fileInput.click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleFile(fileInput.files[0]);
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    refImage = e.target.result.split(',')[1];
    zone.innerHTML = `<img src="${e.target.result}">`;
  };
  reader.readAsDataURL(file);
}

// --- Logging ---
function log(msg, cls) {
  const area = document.getElementById('logArea');
  const el = document.getElementById('log');
  area.style.display = 'block';
  const time = new Date().toLocaleTimeString('ja-JP');
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = `[${time}] ${msg}\n`;
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

// --- Submit ---
document.getElementById('submitBtn').addEventListener('click', async () => {
  const endpointId = document.getElementById('endpointId').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!endpointId || !apiKey) {
    document.getElementById('apiSettings').open = true;
    alert('API Settings を入力してください');
    return;
  }
  if (!refImage) {
    alert('参照画像を選択してください');
    return;
  }

  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) { alert('プロンプトを入力してください'); return; }

  const inputData = {
    prompt,
    negative_prompt: document.getElementById('negative').value.trim() || undefined,
    image_base64: refImage,
    width: parseInt(document.getElementById('width').value),
    height: parseInt(document.getElementById('height').value),
    steps: parseInt(document.getElementById('steps').value),
    seed: parseInt(document.getElementById('seed').value),
    guidance: parseFloat(document.getElementById('guidance').value),
    ip_adapter_weight: parseFloat(document.getElementById('ip-weight').value),
    quality: parseInt(document.getElementById('quality').value)
  };

  const apiUrl = `https://api.runpod.ai/v2/${endpointId}`;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';
  document.getElementById('resultArea').style.display = 'none';

  log(`${inputData.width}x${inputData.height}, steps=${inputData.steps}, guidance=${inputData.guidance}, ip_weight=${inputData.ip_adapter_weight}`);

  try {
    log('ジョブを投入中...');
    const res = await fetch(apiUrl + '/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ input: inputData })
    });
    const data = await res.json();

    if (!data.id) {
      log('エラー: ジョブIDを取得できませんでした — ' + JSON.stringify(data), 'error');
      btn.disabled = false; btn.textContent = '生成開始';
      return;
    }

    log('ジョブID: ' + data.id);
    pollStatus(apiUrl, apiKey, data.id, btn);
  } catch (e) {
    log('リクエストエラー: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '生成開始';
  }
});

// --- Poll ---
function pollStatus(apiUrl, apiKey, jobId, btn) {
  if (polling) clearInterval(polling);
  log('完了を待機中...');

  polling = setInterval(async () => {
    try {
      const res = await fetch(apiUrl + '/status/' + jobId, {
        headers: { 'Authorization': 'Bearer ' + apiKey }
      });
      const data = await res.json();
      log('ステータス: ' + data.status);

      if (data.status === 'COMPLETED') {
        clearInterval(polling);
        log(`完了! 実行時間: ${data.executionTime}ms`, 'success');
        showImage(data.output.image);
        btn.disabled = false; btn.textContent = '生成開始';
      } else if (data.status === 'FAILED') {
        clearInterval(polling);
        log('ジョブ失敗: ' + JSON.stringify(data.error), 'error');
        btn.disabled = false; btn.textContent = '生成開始';
      }
    } catch (e) {
      log('ポーリングエラー: ' + e.message, 'error');
    }
  }, 5000);
}

// --- Show result ---
function showImage(dataUrl) {
  const area = document.getElementById('resultArea');
  const img = document.getElementById('resultImage');
  const dl = document.getElementById('downloadBtn');

  img.src = dataUrl;
  dl.href = dataUrl;
  area.style.display = 'block';

  // 自動ダウンロード
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = 'output_' + new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19) + '.jpg';
  a.click();
}
</script>
</body>
</html>
