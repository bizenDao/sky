<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SKY — Image Generator UI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 24px; }
h1 { font-size: 1.5rem; margin-bottom: 24px; color: #8bb4ff; }
h1 .nav { font-size: 0.85rem; margin-left: 12px; }
h1 .nav a { color: #555; text-decoration: none; margin: 0 4px; }
h1 .nav a:hover { color: #8bb4ff; }

/* Form */
.panel { background: #16213e; border: 1px solid #2a2a4a; border-radius: 8px; padding: 24px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 0.85rem; color: #8bb4ff; margin-bottom: 6px; }
.field input[type="text"], .field textarea, .field select { width: 100%; padding: 10px; background: #0d1b2a; border: 1px solid #2a2a4a; border-radius: 6px; color: #e0e0e0; font-size: 0.9rem; }
.field textarea { resize: vertical; min-height: 60px; }
.field input[type="range"] { width: 100%; accent-color: #8bb4ff; }
.field .hint { font-size: 0.75rem; color: #555; margin-top: 4px; }

/* Row */
.row { display: flex; gap: 16px; }
.row .field { flex: 1; }

/* API settings */
.api-settings { background: #0d1b2a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
.api-settings summary { cursor: pointer; color: #8bb4ff; font-size: 0.85rem; }
.api-settings .setting-group { margin-top: 12px; }
.api-settings .setting-group label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 4px; }
.api-settings .fields { display: flex; gap: 12px; }
.api-settings input { flex: 1; padding: 8px; background: #16213e; border: 1px solid #2a2a4a; border-radius: 6px; color: #e0e0e0; font-size: 0.85rem; }

/* Model selector */
.model-selector { display: flex; gap: 4px; margin-bottom: 24px; }
.model-btn { padding: 10px 20px; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; cursor: pointer; font-size: 0.9rem; color: #888; transition: all 0.2s; }
.model-btn.active { color: #8bb4ff; border-color: #8bb4ff; background: #16213e; }
.model-btn .sub { display: block; font-size: 0.7rem; color: #555; margin-top: 2px; }
.model-btn.active .sub { color: #6690cc; }

/* Button */
.submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #4a6fa5, #8bb4ff); border: none; border-radius: 8px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.submit-btn:hover { opacity: 0.9; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Log */
.log-area { margin-top: 24px; background: #0d1b2a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 16px; display: none; }
.log-area h3 { font-size: 0.85rem; color: #8bb4ff; margin-bottom: 8px; }
.log-area .log { font-family: 'SF Mono', Monaco, monospace; font-size: 0.8rem; color: #aaa; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
.log .error { color: #ff6b6b; }
.log .success { color: #6bff9e; }

/* Result */
.result-area { margin-top: 16px; display: none; }
.result-area img { width: 100%; border-radius: 8px; background: #000; }
.download-btn { display: inline-block; margin-top: 8px; padding: 8px 16px; background: #2a4a2a; border: 1px solid #3a6a3a; border-radius: 6px; color: #6bff9e; text-decoration: none; font-size: 0.85rem; }

/* Footer */
footer { margin-top: 48px; padding: 24px 0; border-top: 1px solid #2a2a4a; text-align: center; font-size: 0.8rem; color: #666; }
footer a { color: #8bb4ff; text-decoration: none; }
footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>SKY — Image Generator
    <span class="nav"><a href="index.html">Video</a> <a href="edit.html">Edit</a></span>
  </h1>

  <details class="api-settings" id="apiSettings">
    <summary>API Settings</summary>
    <div class="setting-group">
      <label>Momoiro Pony (generate_image)</label>
      <div class="fields">
        <input type="text" id="endpointPony" placeholder="Endpoint ID (Pony)">
      </div>
    </div>
    <div class="setting-group">
      <label>Animagine XL 4.0 (generate_pict)</label>
      <div class="fields">
        <input type="text" id="endpointIllustrious" placeholder="Endpoint ID (Animagine)">
      </div>
    </div>
    <div class="setting-group">
      <label>HiDream-I1 (generate_dream)</label>
      <div class="fields">
        <input type="text" id="endpointHidream" placeholder="Endpoint ID (HiDream)">
      </div>
    </div>
    <div class="setting-group">
      <label>API Key (shared)</label>
      <div class="fields">
        <input type="password" id="apiKey" placeholder="API Key">
      </div>
    </div>
  </details>

  <div class="model-selector">
    <div class="model-btn active" data-model="pony">Momoiro Pony<span class="sub">score tags / CFG 7</span></div>
    <div class="model-btn" data-model="illustrious">Animagine 4.0<span class="sub">tag-based / CFG 5</span></div>
    <div class="model-btn" data-model="hidream">HiDream-I1<span class="sub">natural lang / CFG 1</span></div>
  </div>

  <div class="panel">
    <div class="field">
      <label for="prompt">プロンプト</label>
      <textarea id="prompt" placeholder="1girl, blue hair, cherry blossoms, garden, detailed illustration..."></textarea>
      <div class="hint" id="promptHint">品質タグ (score_9, score_8_up, score_7_up) は自動付与されます</div>
    </div>
    <div class="field">
      <label for="negative">ネガティブプロンプト</label>
      <textarea id="negative" placeholder="lowres, bad anatomy, blurry..."></textarea>
    </div>
    <div class="row">
      <div class="field">
        <label for="width">幅</label>
        <input type="text" id="width" value="1024">
      </div>
      <div class="field">
        <label for="height">高さ</label>
        <input type="text" id="height" value="1024">
      </div>
      <div class="field">
        <label for="steps">ステップ数</label>
        <input type="text" id="steps" value="25">
      </div>
      <div class="field">
        <label for="seed">シード</label>
        <input type="text" id="seed" value="42">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label for="cfg">CFG: <span id="cfg-val">7.0</span></label>
        <input type="range" id="cfg" min="1" max="15" step="0.5" value="7.0">
      </div>
      <div class="field">
        <label for="quality">JPEG品質: <span id="quality-val">90</span></label>
        <input type="range" id="quality" min="1" max="100" value="90">
      </div>
    </div>
    <button class="submit-btn" id="submitBtn">生成開始</button>
  </div>

  <div class="log-area" id="logArea">
    <h3>ログ</h3>
    <div class="log" id="log"></div>
  </div>

  <div class="result-area" id="resultArea">
    <img id="resultImage">
    <a class="download-btn" id="downloadBtn" download="output.jpg">ダウンロード</a>
  </div>

  <footer>
    <p>copyright &copy; 2026 bonsoleil</p>
    <p>
      <a href="https://github.com/bizendao/sky" target="_blank" rel="noopener noreferrer">GitHub</a>
      &nbsp;|&nbsp;
      <a href="https://github.com/bizendao/generate_image" target="_blank" rel="noopener noreferrer">generate_image</a>
      &nbsp;|&nbsp;
      <a href="https://github.com/bizendao/generate_pict" target="_blank" rel="noopener noreferrer">generate_pict</a>
      &nbsp;|&nbsp;
      <a href="https://github.com/bizendao/generate_dream" target="_blank" rel="noopener noreferrer">generate_dream</a>
    </p>
  </footer>
</div>

<script>
// --- State ---
let polling = null;
let currentModel = 'pony';

const MODEL_DEFAULTS = {
  pony:        { steps: 25, cfg: 7.0, hint: '品質タグ (score_9, score_8_up, score_7_up) は自動付与されます' },
  illustrious: { steps: 28, cfg: 5.0, hint: '品質タグ (masterpiece, high score, great score, absurdres) は自動付与されます' },
  hidream:     { steps: 28, cfg: 1.0, hint: '品質タグなし。自然言語プロンプト推奨' }
};

// --- Model selector ---
document.querySelectorAll('.model-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentModel = btn.dataset.model;
    const d = MODEL_DEFAULTS[currentModel];
    document.getElementById('steps').value = d.steps;
    document.getElementById('cfg').value = d.cfg;
    document.getElementById('cfg-val').textContent = d.cfg;
    document.getElementById('promptHint').textContent = d.hint;
  });
});

// --- API settings persistence ---
function loadSettings() {
  const s = localStorage.getItem('sky_api_image_v3');
  if (s) {
    const d = JSON.parse(s);
    document.getElementById('endpointPony').value = d.ep || '';
    document.getElementById('endpointIllustrious').value = d.ei || '';
    document.getElementById('endpointHidream').value = d.eh || '';
    document.getElementById('apiKey').value = d.k || '';
  }
}
function saveSettings() {
  localStorage.setItem('sky_api_image_v3', JSON.stringify({
    ep: document.getElementById('endpointPony').value,
    ei: document.getElementById('endpointIllustrious').value,
    eh: document.getElementById('endpointHidream').value,
    k: document.getElementById('apiKey').value
  }));
}
document.getElementById('endpointPony').addEventListener('change', saveSettings);
document.getElementById('endpointIllustrious').addEventListener('change', saveSettings);
document.getElementById('endpointHidream').addEventListener('change', saveSettings);
document.getElementById('apiKey').addEventListener('change', saveSettings);
loadSettings();

// --- Range sliders ---
document.querySelectorAll('input[type="range"]').forEach(r => {
  r.addEventListener('input', () => {
    const valEl = document.getElementById(r.id + '-val');
    if (valEl) valEl.textContent = r.value;
  });
});

// --- Logging ---
function log(msg, cls) {
  const area = document.getElementById('logArea');
  const el = document.getElementById('log');
  area.style.display = 'block';
  const time = new Date().toLocaleTimeString('ja-JP');
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = `[${time}] ${msg}\n`;
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

// --- Submit ---
document.getElementById('submitBtn').addEventListener('click', async () => {
  const apiKey = document.getElementById('apiKey').value.trim();
  const endpointMap = {
    pony: 'endpointPony',
    illustrious: 'endpointIllustrious',
    hidream: 'endpointHidream'
  };
  const endpointId = document.getElementById(endpointMap[currentModel]).value.trim();

  if (!endpointId || !apiKey) {
    document.getElementById('apiSettings').open = true;
    alert('API Settings を入力してください');
    return;
  }

  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) { alert('プロンプトを入力してください'); return; }

  const inputData = {
    prompt,
    negative_prompt: document.getElementById('negative').value.trim() || undefined,
    width: parseInt(document.getElementById('width').value),
    height: parseInt(document.getElementById('height').value),
    steps: parseInt(document.getElementById('steps').value),
    seed: parseInt(document.getElementById('seed').value),
    cfg: parseFloat(document.getElementById('cfg').value),
    quality: parseInt(document.getElementById('quality').value)
  };

  const apiUrl = `https://api.runpod.ai/v2/${endpointId}`;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';
  document.getElementById('resultArea').style.display = 'none';

  log(`[${currentModel}] ${inputData.width}x${inputData.height}, steps=${inputData.steps}, cfg=${inputData.cfg}`);

  try {
    log('ジョブを投入中...');
    const res = await fetch(apiUrl + '/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ input: inputData })
    });
    const data = await res.json();

    if (!data.id) {
      log('エラー: ジョブIDを取得できませんでした — ' + JSON.stringify(data), 'error');
      btn.disabled = false; btn.textContent = '生成開始';
      return;
    }

    log('ジョブID: ' + data.id);
    pollStatus(apiUrl, apiKey, data.id, btn);
  } catch (e) {
    log('リクエストエラー: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '生成開始';
  }
});

// --- Poll ---
function pollStatus(apiUrl, apiKey, jobId, btn) {
  if (polling) clearInterval(polling);
  log('完了を待機中...');

  polling = setInterval(async () => {
    try {
      const res = await fetch(apiUrl + '/status/' + jobId, {
        headers: { 'Authorization': 'Bearer ' + apiKey }
      });
      const data = await res.json();
      log('ステータス: ' + data.status);

      if (data.status === 'COMPLETED') {
        clearInterval(polling);
        log(`完了! 実行時間: ${data.executionTime}ms`, 'success');
        showImage(data.output.image);
        btn.disabled = false; btn.textContent = '生成開始';
      } else if (data.status === 'FAILED') {
        clearInterval(polling);
        log('ジョブ失敗: ' + JSON.stringify(data.error), 'error');
        btn.disabled = false; btn.textContent = '生成開始';
      }
    } catch (e) {
      log('ポーリングエラー: ' + e.message, 'error');
    }
  }, 5000);
}

// --- Show result ---
function showImage(dataUrl) {
  const area = document.getElementById('resultArea');
  const img = document.getElementById('resultImage');
  const dl = document.getElementById('downloadBtn');

  img.src = dataUrl;
  dl.href = dataUrl;
  area.style.display = 'block';

  const prefix = currentModel;
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = prefix + '_' + new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19) + '.jpg';
  a.click();
}
</script>
</body>
</html>
